<svg width="760" height="460" viewBox="0 0 760 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FCFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#50C5D4"/>
      <stop offset="1" stop-color="#087D90"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#14313B" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="760" height="460" rx="30" fill="url(#bg)"/>
  <circle cx="104" cy="88" r="64" fill="#DDF6FA"/>
  <circle cx="578" cy="96" r="58" fill="#EEF6FF" fill-opacity="0.72"/>

  <rect x="44" y="44" width="52" height="52" rx="16" fill="url(#cyan)"/>
  <text x="70" y="77" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="900" fill="#fff">J10</text>
  <text x="116" y="73" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="950" fill="#111827">Plus 专业解读</text>
  <text x="116" y="108" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="750" fill="#657184">把快讯变成判断</text>
  <rect x="506" y="72" width="144" height="40" rx="20" fill="#DDF6FA"/>
  <text x="578" y="99" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="900" fill="#087D90">6个月权益</text>

  <g filter="url(#shadow)">
