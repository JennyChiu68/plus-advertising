  </g>

  <path d="M360 246H402" stroke="#48BBCD" stroke-width="12" stroke-linecap="round"/>
  <path d="M392 224L424 246L392 268" stroke="#48BBCD" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
