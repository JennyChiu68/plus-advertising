    <text x="76" y="235" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="950" fill="#111827">发生了什么？</text>
    <text x="76" y="282" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="750" fill="#657184">新闻、数据、政策</text>
