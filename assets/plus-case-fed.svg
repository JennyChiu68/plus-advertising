<svg width="760" height="420" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FDFF"/>
      <stop offset="1" stop-color="#FFFDF8"/>
    </linearGradient>
    <linearGradient id="bar" x1="72" y1="0" x2="688" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4EBFD0"/>
      <stop offset="0.6" stop-color="#E6BC68"/>
      <stop offset="1" stop-color="#E65B6D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14313B" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="760" height="420" rx="30" fill="url(#bg)"/>
  <rect x="42" y="38" width="156" height="44" rx="22" fill="#DDF6FA"/>
  <text x="120" y="67" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="900" fill="#087D90">加息风险</text>

  <text x="54" y="126" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="950" fill="#111827">不是看“按兵不动”</text>
  <text x="54" y="166" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="850" fill="#566176">而是看下一步风险是否重估</text>

  <rect x="72" y="202" width="616" height="14" rx="7" fill="url(#bar)"/>
  <circle cx="520" cy="209" r="17" fill="#111827"/>
  <circle cx="520" cy="209" r="8" fill="#FFD37C"/>
  <text x="72" y="192" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="900" fill="#7C8496">降息交易</text>
  <text x="610" y="192" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="900" fill="#7C8496">加息风险</text>

  <g filter="url(#shadow)">
    <rect x="42" y="248" width="676" height="118" rx="26" fill="#FFFFFF"/>
    <text x="72" y="293" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="900" fill="#087D90">Plus把变量放在一起</text>
    <rect x="72" y="316" width="126" height="34" rx="17" fill="#F2F8FA"/>
    <text x="135" y="339" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="900" fill="#D89D40">通胀偏强</text>
    <rect x="214" y="316" width="126" height="34" rx="17" fill="#F2F8FA"/>
    <text x="277" y="339" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="900" fill="#D89D40">就业未降温</text>
    <rect x="356" y="316" width="126" height="34" rx="17" fill="#F2F8FA"/>
    <text x="419" y="339" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="900" fill="#D89D40">官员偏鹰</text>
    <rect x="544" y="286" width="122" height="58" rx="20" fill="#111827"/>
    <text x="605" y="323" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="950" fill="#FFFFFF">风险重估</text>
  </g>
</svg>
